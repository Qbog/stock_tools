# clashlite example config

# FakeDNS listen (udp)
dns_listen=127.0.0.1:1053

# Transparent proxy listen (tcp)
tproxy_listen=127.0.0.1:12345

# Transparent proxy listen (udp)
udp_listen=0.0.0.0:12346

# Upstream DNS server for forwarding & resolving real IPs
upstream_dns=223.5.5.5:53

# Optional upstream SOCKS5 (no-auth). If empty -> direct connect
# socks5_upstream=127.0.0.1:7890
socks5_upstream=

# Fake IP pool. Default uses RFC 2544 benchmarking range.
fake_range=198.18.0.0/15

# FakeDNS rules:
# 1) comma-separated domain suffixes.
#    Empty means: fake ALL A queries.
#    Example: fake_suffix_rules=.google.com,.youtube.com,.twitter.com
fake_suffix_rules=

# 2) optional rules file, one domain/suffix per line, # for comments.
#    If set, will be loaded in addition to fake_suffix_rules.
# fake_rules_file=/etc/clashlite/fake_rules.txt
fake_rules_file=

# TTL for fake A responses (seconds)
fake_ttl=60

# Logging: 0/1
verbose=1
